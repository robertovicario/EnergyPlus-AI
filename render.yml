services:

    - type: web
      name: energyplus-ai
      env: docker
      dockerfilePath: docker/Dockerfile.app
      plan: free
      envVars:
          - key: PORT
            value: 10000
          - key: REDIS_URL
            fromService:
                type: redis
                name: energyplus-redis
                property: connectionString
          - key: ENV
            value: production

    - type: redis
      name: energyplus-redis

{% macro widget(w_id, w_title, w_theme, w_icon, w_value, b_id=None, b_items=None) %}
<div class="col">
    <div class="card flex-grow-1">
        <div class="card-body">
            <div class="d-flex gap-4 align-items-center">
                <div class="icon icon-shape flex-none text-lg text-bg-{{ w_theme }}">
                    <i class="bi {{ w_icon }}"></i>
                </div>
                <div>
                    <div class="h6 text-body-secondary mb-1">{{ w_title | safe }}</div>
                    <div class="d-flex align-items-center gap-4">
                        <div id="{{ w_id }}" class="d-flex align-items-center text-xl text-heading fw-semibold lh-xs ls-tight">{{ w_value }}</div>
                        {% if b_items %}
                            <div class="d-flex align-items-center gap-1 cursor-pointer" data-bs-toggle="modal" data-bs-target="#info-{{ b_id }}">
                                <div class="badge d-inline-flex align-items-center gap-2 border text-{{ b_items.theme }}">
                                    <span class="text-body-secondary">{{ b_items.keyword | safe }}</span>
                                    {{ b_items.value | safe }}
                                </div>
                            </div>
                        {% endif %}
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endmacro %}

<!-- Jinja :: Template -->
{% extends 'base-1.html' %}

<!-- Jinja :: Theme -->
{% set theme_title = 'Error Page' %}

<!-- Jinja :: Content -->
{% block content %}
<section class="py-24">
    <div class="container mw-screen-lg">
        <div class="bg-body rounded shadow-soft-3 border p-20">
            <div class="row justify-content-center">
                <div class="col-12 col-md-10 col-lg-8 text-center">
                    <div class="mb-5 icon icon-shape rounded-circle bg-opacity-25 bg-danger text-danger text-lg">
                        <i class="bi bi-lightning-charge-fill"></i>
                    </div>
                    <h1 class="ls-tight display-6 text-danger">{{ err_name }}</h1>
                    <p class="mt-4 mb-8 mx-auto">Error {{ err_code }}: {{ err_desc }}</p>
                    <div class="hstack gap-3 justify-content-center">
                        <a href="{{ request.url_for('templates:root') }}" class="btn btn-danger">Come Back</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
